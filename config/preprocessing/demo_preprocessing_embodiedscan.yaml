dataset: 
  modality: image
  dataset_name:  image_base
  data_dir: "Path to embodied scan dataset parquet file, e.g., /pfs/jianhuiliu/tmp/embodiedscan_sample.parquet"
  # Root of the raw EmbodiedScan dataset (contains scannet/, 3rscan/, etc.).
  # Used to resolve relative path fields (image/depth_map/intrinsic/pose/axis_align_matrix)
  # stored in the parquet by the `embodiedscan_data extract` step.
  data_root: "Path to EmbodiedScan data root, e.g., /path/to/EmbodiedScan/data"

pipeline: 
  file_name: base_pipeline
  class_name: BasePipeline

  stages:

    filter_stage:
      -
        file_name: 3dbox_filter
        method: ThreeDBoxFilter
        proj_mask_threshold: 0.1
        box3d_pcd_threshold: 0.1
        box_scale_factor: 0.9
        mask_area_threshold: 0.005
        update_keys: []
        filter_tags: ["ceiling", "floor", "wall", "object"]
        output_dir:  

    localization_stage:
      -
        file_name: sam2_refiner
        method: Sam2Refiner
        update_keys: ["obj_tags", "bboxes_3d_world_coords"]
        depends_on: filter_stage/3dbox_filter
        output_dir:  

    scene_fusion_stage:
      -
        file_name: depth_back_projection
        method: DepthBackProjecter
        depends_on: localization_stage/sam2_refiner
        output_dir:

